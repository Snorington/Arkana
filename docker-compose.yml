# Arkana Docker Compose Configuration
#
# Usage:
#   HTTP mode (network/web access):
#     docker compose up arkana-http
#
#   HTTP mode with a pre-loaded file:
#     docker compose run --rm arkana-http --input-file /samples/malware.exe
#
#   stdio mode (for Claude Code / MCP clients):
#     docker compose run --rm -i arkana-stdio
#
#   Build only:
#     docker compose build
#
# Environment:
#   Copy .env.example to .env and set your API keys there,
#   or export VT_API_KEY in your shell before running.
#
# Qiling rootfs:
#   To enable Windows PE emulation, copy DLLs from a Windows installation
#   into ./qiling-rootfs/x86_windows/Windows/System32/ (and x8664_windows
#   for 64-bit).  See docs/QILING_ROOTFS.md for detailed instructions.

services:
  arkana-http:
    build: .
    image: arkana-toolkit:latest
    ports:
      - "127.0.0.1:${ARKANA_PORT:-${PEMCP_PORT:-8082}}:8082"
    volumes:
      - ./samples:/samples:ro
      - ${ARKANA_OUTPUT:-${PEMCP_OUTPUT:-./output}}:/output:rw
      - ${ARKANA_CACHE:-${PEMCP_CACHE:-~/.arkana}}:/app/home/.arkana:rw
      - ${ARKANA_ROOTFS:-${PEMCP_ROOTFS:-./qiling-rootfs}}:/app/qiling-rootfs
    environment:
      - VT_API_KEY=${VT_API_KEY:-}
      - ARKANA_API_KEY=${ARKANA_API_KEY:-${PEMCP_API_KEY:-}}
      - ARKANA_PATH_MAP=/samples=${ARKANA_SAMPLES:-${PEMCP_SAMPLES:-./samples}};/output=${ARKANA_OUTPUT:-${PEMCP_OUTPUT:-./output}}
    command:
      - "--mcp-server"
      - "--mcp-transport"
      - "streamable-http"
      - "--mcp-host"
      - "0.0.0.0"
      - "--allowed-paths"
      - "/samples"
      - "/output"
      - "--samples-path"
      - "/samples"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/dashboard/login')"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  arkana-stdio:
    build: .
    image: arkana-toolkit:latest
    stdin_open: true
    volumes:
      - ./samples:/samples:ro
      - ${ARKANA_OUTPUT:-${PEMCP_OUTPUT:-./output}}:/output:rw
      - ${ARKANA_CACHE:-${PEMCP_CACHE:-~/.arkana}}:/app/home/.arkana:rw
      - ${ARKANA_ROOTFS:-${PEMCP_ROOTFS:-./qiling-rootfs}}:/app/qiling-rootfs
    environment:
      - VT_API_KEY=${VT_API_KEY:-}
      - ARKANA_PATH_MAP=/samples=${ARKANA_SAMPLES:-${PEMCP_SAMPLES:-./samples}};/output=${ARKANA_OUTPUT:-${PEMCP_OUTPUT:-./output}}
    command: ["--mcp-server", "--samples-path", "/samples"]
    profiles:
      - stdio
